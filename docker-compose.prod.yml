services:
  postgres:
    image: postgres:15
    container_name: geo_postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: geo_postgres_2024
      POSTGRES_DB: commodity_geo
    volumes:
      - geo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geo-net

  redis:
    image: redis:7-alpine
    container_name: geo_redis
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - geo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geo-net

  backend:
    build: ./backend
    container_name: geo_backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:geo_postgres_2024@postgres:5432/commodity_geo
      REDIS_URL: redis://redis:6379/0
      DEEPSEEK_API_KEY: sk-cc683df4798e440b91aa111042d95e29
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-chat
      AKSHARE_FETCH_INTERVAL: 300
      NEWS_FETCH_INTERVAL: 3600
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - geo-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ""
    container_name: geo_frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "9180:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - geo-net

volumes:
  geo_pgdata:
  geo_redisdata:

networks:
  geo-net:
    driver: bridge
